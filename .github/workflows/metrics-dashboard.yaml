name: Metrics Dashboard CI/CD

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - 'metrics-dashboard/**'
      - '.github/workflows/metrics-dashboard.yaml'

  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - 'metrics-dashboard/**'

  workflow_dispatch:

permissions: {}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: ./metrics-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint code
        run: pnpm run lint 2>/dev/null || echo "No lint script configured"

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Upload coverage reports (optional)
        uses: codecov/codecov-action@75ecb36a0ebb6d740c44ff5e84541c2a8cf9d8f8 # v4.0.0
        if: always()
        with:
          directory: ./metrics-dashboard/coverage
          fail_ci_if_error: false
          verbose: true

  publish-artifact:
    name: Publish Build Artifact
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./metrics-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: metrics-dashboard-build
          path: metrics-dashboard/dist
          retention-days: 30
